<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <title>CCNA v7 Quiz</title>
  <link rel="stylesheet" href="css/styles.css?v=4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-text">CCNA Quiz</span>
    </div>
    <div class="topbar-controls">
      <button type="button" id="btn-lang" class="ctrl-btn" title="Sprache / Language">DE</button>
      <button type="button" id="btn-theme" class="ctrl-btn ctrl-theme" title="Theme">☀️</button>
    </div>
  </header>

  <div id="app">
    <!-- Kursauswahl -->
    <section id="screen-courses" class="screen">
      <header class="hero hero-compact">
        <div class="hero-badge" data-i18n="badgeGlobal"></div>
        <h1 data-i18n="chooseCourse"></h1>
        <p class="hero-sub" data-i18n="chooseCourseSub"></p>
      </header>
      <div id="course-list" class="course-grid"></div>
    </section>

    <!-- Prüfungsblock-Auswahl (strikt getrennt) -->
    <section id="screen-exams" class="screen">
      <button class="btn-back" id="btn-back-courses" data-i18n="backCourses"></button>
      <header class="hero hero-compact">
        <h1 id="exam-course-title"></h1>
        <p class="hero-sub" data-i18n="chooseExamSub"></p>
        <p class="isolation-banner" data-i18n="isolationBanner"></p>
      </header>
      <div id="exam-list" class="exam-grid"></div>
    </section>

    <!-- Startseite eines gewählten Prüfungsblocks -->
    <section id="screen-home" class="screen">
      <button class="btn-back btn-change-exam" id="btn-change-exam" data-i18n="changeExam"></button>
      <header class="hero">
        <div class="hero-badge" id="hero-badge"></div>
        <h1 id="hero-title"></h1>
        <p class="hero-sub" id="hero-sub"></p>
        <p class="isolation-notice" id="isolation-notice"></p>
      </header>

      <div class="stats-grid" id="stats-overview"></div>

      <div class="mode-grid">
        <button class="mode-card" data-mode="learn">
          <span class="mode-icon">📖</span>
          <h3 data-i18n="modeLearnTitle"></h3>
          <p data-i18n="modeLearnDesc"></p>
        </button>
        <button class="mode-card" data-mode="practice">
          <span class="mode-icon">🎯</span>
          <h3 data-i18n="modePracticeTitle"></h3>
          <p data-i18n="modePracticeDesc"></p>
        </button>
        <button class="mode-card" data-mode="exam">
          <span class="mode-icon">⏱️</span>
          <h3 data-i18n="modeExamTitle"></h3>
          <p data-i18n="modeExamDesc"></p>
        </button>
        <button class="mode-card highlight" data-mode="mistakes">
          <span class="mode-icon">🔄</span>
          <h3 data-i18n="modeMistakesTitle"></h3>
          <p id="mistakes-count" data-i18n="modeMistakesDesc"></p>
        </button>
        <button class="mode-card" data-mode="weak">
          <span class="mode-icon">💪</span>
          <h3 data-i18n="modeWeakTitle"></h3>
          <p data-i18n="modeWeakDesc"></p>
        </button>
        <button class="mode-card" data-mode="module">
          <span class="mode-icon">📚</span>
          <h3 data-i18n="modeModuleTitle"></h3>
          <p data-i18n="modeModuleDesc"></p>
        </button>
      </div>

      <div class="learning-overview" id="learning-overview">
        <h2 data-i18n="learnTitle"></h2>
        <div class="topic-cards" id="topic-cards"></div>
      </div>
    </section>

    <section id="screen-module" class="screen">
      <button class="btn-back" data-back-home data-i18n="back"></button>
      <h2 data-i18n="chooseModule"></h2>
      <div class="module-select" id="module-select"></div>
    </section>

    <section id="screen-quiz" class="screen">
      <div class="quiz-header">
        <button class="btn-back" data-back-home data-i18n="backQuiz"></button>
        <div class="quiz-meta">
          <span id="quiz-mode-label"></span>
          <span id="quiz-bank-label" class="quiz-bank-label"></span>
          <span id="quiz-progress">1 / 76</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="exam-timer" class="exam-timer hidden">60:00</div>
      </div>

      <div class="question-card">
        <div class="question-meta">
          <span class="q-badge" id="q-module"></span>
          <span class="q-badge topic" id="q-topic"></span>
          <span class="q-badge mastery" id="q-mastery"></span>
        </div>
        <h2 id="q-text" class="question-text"></h2>
        <p id="q-text-alt-label" class="question-text-alt-label hidden"></p>
        <p id="q-text-alt" class="question-text-alt"></p>

        <div id="q-image-wrap" class="image-wrap hidden">
          <img id="q-image" alt="">
        </div>
        <pre id="q-exhibit" class="exhibit hidden"></pre>

        <div id="q-options" class="options"></div>

        <div id="feedback" class="feedback hidden">
          <div id="feedback-result" class="feedback-result"></div>
          <div id="feedback-mnemonic" class="mnemonic-box hidden">
            <strong id="mnemonic-label"></strong>
            <span id="mnemonic-text"></span>
          </div>
          <div id="feedback-explanation" class="explanation-box"></div>
        </div>

        <div class="quiz-actions">
          <button id="btn-check" class="btn-primary" disabled data-i18n="checkAnswer"></button>
          <button id="btn-next" class="btn-primary hidden" data-i18n="next"></button>
          <button id="btn-finish" class="btn-primary hidden" data-i18n="showResult"></button>
        </div>
      </div>
    </section>

    <section id="screen-results" class="screen">
      <div class="results-card">
        <h2 data-i18n="resultTitle"></h2>
        <div class="score-circle" id="score-circle">
          <span id="score-percent">0%</span>
        </div>
        <p id="score-detail"></p>
        <div id="results-breakdown"></div>
        <div class="results-actions">
          <button class="btn-primary" id="btn-repeat-mistakes" data-i18n="repeatMistakes"></button>
          <button class="btn-secondary" data-back-home data-i18n="home"></button>
        </div>
      </div>
    </section>
  </div>

  <script src="js/options-de-data.js?v=4"></script>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
