# GitLab Pages – statisches Quiz deployen
pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html public/
    - cp .nojekyll public/ 2>/dev/null || touch public/.nojekyll
    - cp -r css js assets data public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
